<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routefy Main Layout</title>
    <link rel="icon" href="assets/images//logo/favicon.ico" type="image/x-icon">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->

<body>

    <!-- Mobile Topbar -->
    <nav class="top-navbar">

            <button class="btn" onclick="toggleSidebar()">

        </div>

        <!-- RIGHT (desktop + mobile) -->
        <div class="navbar-right ms-auto">
            <div class="dropdown">
                <a href="#" class="profile-toggle" data-bs-toggle="dropdown">
                    <img src="https://i.pravatar.cc/40" alt="Profile">
                    <span class="d-none d-md-inline">Sadam</span>
                    <i class="bi bi-chevron-down"></i>
                </a>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- Sidebar -->
    <aside class="sidebar">
        <!-- Sidebar Header / Logo -->
        <div class="sidebar-logo">Routefy</div>

        <!-- Scrollable Menu -->
        <div class="sidebar-menu">
            <ul class="menu">
                <li>
                    <a href="#">
                        <i class="bi bi-house"></i>

                    </a>

                        <i class="bi bi-chevron-down ms-auto"></i>
                    </a>
                    <ul class="submenu">
                        <li><a href="DashboardKit.html">Dashboard Kits</a></li>
                        <li><a href="login.html">Login</a></li>
                        <li><a href="ResetPassword.html">Reset Password</a></li>
                        <li><a href="OTPVerification.html">OTP Verification</a></li>
                        <li><a href="ChangePassword.html">Change Password</a></li>
                    </ul>
                </li>

                <!-- Add as many li as you want -->
            </ul>
        </div>

    </aside>


    <!-- Overlay (mobile only) -->
    <div id="overlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <!-- Main Wrapper -->
    <div class="page-wrapper">

        <!-- Main Content -->
        <main class="content">
            <div class="container-fluid">
                <h1 class="fw-bold">Dashboard</h1>
                <p class="text-muted">Short content example.</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <span>© <time datetime="2026">2026</time> <span class="primary-color">Routefy</span>. All rights reserved.</span>
            </div>

    <script src="assets/js/script.js"></script>
