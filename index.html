<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layouts Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            text-align: center;
        }

        a.button {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;

            background-color: #007BFF;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            transition: 0.3s;
        }

        a.button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="layout_1.html" class="button">Layout 1</a>
        <a href="layout_2.html" class="button">Layout 2</a>

    </div>

</html>
